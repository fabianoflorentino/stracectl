pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "**/*.go"
      run: bash -c 'files=$(gofmt -l .); [ -z "$files" ] && exit 0; printf "unformatted files (run gofmt):\n%s\n" "$files"; exit 1'
    goimports:
      glob: "**/*.go"
      run: bash -c 'command -v goimports >/dev/null 2>&1 || exit 0; files=$(goimports -l .); [ -z "$files" ] && exit 0; printf "goimports issues (run goimports -w .):\n%s\n" "$files"; exit 1'

    vet:
      glob: "**/*.go"
      run: go vet ./...

    lint:
      glob: "**/*.go"
      run: bash -c 'golangci-lint run --out-format=github-actions 2>/dev/null || golangci-lint run'

    test:
      run: |
        go test -race -coverprofile=/tmp/stracectl-coverage.out ./... &&
        go tool cover -func=/tmp/stracectl-coverage.out &&
        COV=$(go tool cover -func=/tmp/stracectl-coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%') &&
        awk "BEGIN {if ($COV+0 < 80) {print \"❌ Coverage \" $COV \"% is below the required 80%\"; exit 1} else {print \"✅ Coverage \" $COV \"% meets the 80% threshold\"}}"

pre-push:
  parallel: true
  commands:
    build:
      run: go build ./...

    mod-tidy:
      run: |
        go mod tidy
        git diff --exit-code -- go.mod go.sum || (echo "go.mod/go.sum are not tidy — run 'go mod tidy' and stage the changes"; exit 1)
    lint-full:
      run: golangci-lint run --timeout=5m

    test-cover:
      run: |
        go test -race -coverprofile=/tmp/stracectl-coverage.out ./... &&
        go tool cover -func=/tmp/stracectl-coverage.out &&
        COV=$(go tool cover -func=/tmp/stracectl-coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%') &&
        awk "BEGIN {if ($COV+0 < 80) {print \"❌ Coverage \" $COV \"% is below the required 80%\"; exit 1} else {print \"✅ Coverage \" $COV \"% meets the 80% threshold\"}}"

    vuln:
      run: govulncheck ./...

    semgrep:
      run: |
        command -v semgrep >/dev/null 2>&1 || { echo "semgrep not installed, skipping"; exit 0; }
        semgrep --config p/go

    trivy:
      run: |
        command -v trivy >/dev/null 2>&1 || { echo "trivy not installed, skipping"; exit 0; }
        if git diff --name-only origin/main..HEAD | grep -qE '(^Dockerfile|^deploy/|^prometheus/|^site/)'; then
          trivy fs --severity CRITICAL,HIGH --exit-code 1 .
        else
          echo "No docker/deploy/site changes, skipping trivy scan"
        fi

    site-build:
      run: |
        if git diff --name-only origin/main..HEAD | grep -q '^site/'; then
          command -v hugo >/dev/null 2>&1 && (cd site && hugo --minify) || echo "hugo not installed, skipping site build"
        else
          echo "No site changes, skipping hugo"
        fi

    ebpf-check:
      run: |
        if git diff --name-only origin/main..HEAD | grep -q '^internal/tracer'; then
          echo "internal/tracer changed — eBPF generation may be required. Run 'bash scripts/generate-bpf.sh' on a prepared machine."
        else
          echo "No eBPF-related changes"
        fi
