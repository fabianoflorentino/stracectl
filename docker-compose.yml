# docker compose up       — starts stracectl in HTTP server mode with live reload
# docker compose up site  — starts Hugo dev server for the documentation site
# docker compose up -d    — detached
# docker compose logs -f  — follow logs
#
# After startup:
#   curl http://localhost:8080/api/stats | jq .
#   curl http://localhost:8080/api/categories | jq .
#   curl http://localhost:8080/metrics
#   wscat -c ws://localhost:8080/stream
#
# Site (Hugo live-reload — equivalent to air for Go):
#   open http://localhost:1313/stracectl/
#
# To trace a different workload, override the air args_bin in .air.toml
# or pass a command directly:
#   docker compose run --rm stracectl air -- run --serve :8080 -- curl https://example.com

services:
  stracectl:
    image: fabianoflorentino/stracectl:dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      # Live source code — changes trigger a hot-reload via air
      - .:/app
      # Persistent Go caches so rebuilds are fast across restarts
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    ports:
      - "8080:8080"
    # ptrace requires SYS_PTRACE and a permissive seccomp profile.
    # Never use these settings in a production deployment.
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

  site:
    image: fabianoflorentino/stracectl:site
    build:
      context: .
      dockerfile: Dockerfile
      target: site
    volumes:
      # Live site source — Hugo watches for changes and reloads the browser
      - ./site:/site
    ports:
      - "1313:1313"
    command:
      - server
      - --bind
      - "0.0.0.0"
      - --disableFastRender
      - --buildDrafts
      - --baseURL
      - "http://localhost:1313/stracectl/"

volumes:
  go-build-cache:
  go-mod-cache:
