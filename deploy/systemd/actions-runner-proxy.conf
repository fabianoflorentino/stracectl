[Service]
# Example systemd drop-in to export HTTP(S)_PROXY and NO_PROXY for the GitHub
# self-hosted runner service. Create this file under the runner service's
# drop-in directory, e.g.:
#   /etc/systemd/system/actions.runner.<org>.<repo>.<runner>.service.d/http-proxy.conf

Environment="HTTP_PROXY=http://proxy.example:3128/"
Environment="HTTPS_PROXY=http://proxy.example:3128/"
Environment="NO_PROXY=localhost,127.0.0.1,::1,169.254.169.254,github.com,api.github.com,raw.githubusercontent.com"
