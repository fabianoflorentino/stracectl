# Default values for the stracectl sidecar.
# Override with: helm install stracectl ./deploy/helm/stracectl -f my-values.yaml

image:
  repository: fabianoflorentino/stracectl
  tag: latest
  pullPolicy: IfNotPresent

# Port the HTTP API listens on inside the container.
port: 8080

# Target container name — the sidecar will scan /proc cgroups and attach to
# Target container name — stracectl first tries to find the lowest PID whose
# cgroup path contains this name. If nothing matches (e.g. containerd/kind
# with cgroupv2 uses hex container IDs instead of names), it automatically
# falls back to matching against the process name (comm) and full cmdline.
# Requires shareProcessNamespace: true on the Pod spec.
targetContainer: "app"

resources:
  requests:
    cpu: "50m"
    memory: "32Mi"
  limits:
    cpu: "200m"
    memory: "64Mi"

# Security context applied to the stracectl sidecar container.
# readOnlyRootFilesystem: reduces attack surface (stracectl writes nothing to disk).
# seccompProfile Unconfined: required because the default Docker seccomp profile
# blocks the ptrace(2) family of syscalls that strace depends on.
securityContext:
  readOnlyRootFilesystem: true
  seccompProfile: Unconfined

# Enable Prometheus ServiceMonitor (requires prometheus-operator)
serviceMonitor:
  enabled: false
  interval: "15s"

# Labels added to all resources
commonLabels: {}
