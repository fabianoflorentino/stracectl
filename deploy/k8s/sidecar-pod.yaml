# Example: inject stracectl as a sidecar into any Pod.
#
# Requirements:
#   - shareProcessNamespace: true        so the sidecar sees the app's PIDs
#   - CAP_SYS_PTRACE on the sidecar      so strace can attach
#
# Usage:
#   kubectl apply -f sidecar-patch.yaml
#   kubectl port-forward pod/<pod-name> 8080
#   curl http://localhost:8080/api/stats | jq .
#   curl http://localhost:8080/metrics
#
# To stream live events:
#   wscat -c ws://localhost:8080/stream
---
apiVersion: v1
kind: Pod
metadata:
  name: myapp-stracectl
  labels:
    app: myapp
spec:
  # Required: makes all containers share a single PID namespace.
  # Without this the sidecar cannot see the app container's processes.
  shareProcessNamespace: true

  containers:
    # ── Target application ────────────────────────────────────────────────────
    - name: app
      image: myapp:latest
      # Replace with your actual image and command.

    # ── stracectl sidecar ─────────────────────────────────────────────────────
    - name: stracectl
      image: fabianoflorentino/stracectl:v1.0.23
      args:
        - attach
        - --serve
        - ":8080"
        # Find the app PID with:  kubectl exec <pod> -c stracectl -- stracectl discover app
        - "1"   # replace with actual PID or use discover subcommand
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: false      # strace/ptrace requires uid 0
        runAsUser: 0
        seccompProfile:
          type: Unconfined      # default Docker seccomp blocks ptrace(2)
        capabilities:
          drop:
            - ALL
          add:
            - SYS_PTRACE        # required: allows strace to attach to processes
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "200m"
          memory: "64Mi"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 2
        periodSeconds: 5
