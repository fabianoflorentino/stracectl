# Example: inject stracectl as a sidecar into any Pod.
# Example: inject stracectl as a sidecar into any Pod.
#
# Requirements:
#   - shareProcessNamespace: true        so the sidecar sees the app's PIDs
#   - CAP_SYS_PTRACE on the sidecar      so strace can attach
#
# Usage:
#   kubectl apply -f sidecar-pod.yaml
#   kubectl -n <ns> port-forward pod/myapp-stracectl 8080:8080
#   curl http://localhost:8080/healthz
#   curl http://localhost:8080/api/stats | jq .
#   curl http://localhost:8080/metrics
#
# To stream live events:
#   wscat -c ws://localhost:8080/stream
#
# Note on --container discovery in containerd/kind environments:
#   Some CRI implementations (e.g. containerd with cgroupv2, used by kind)
#   store hex container IDs in /proc/<pid>/cgroup instead of human-readable
#   names. stracectl falls back automatically to matching by process name
#   (comm) and cmdline, so --container <name> still works as long as the
#   target container's process name or cmdline contains the given string.
---
apiVersion: v1
kind: Pod
metadata:
  name: myapp-stracectl
  labels:
    app: myapp
spec:
  # Required: makes all containers share a single PID namespace.
  # Without this the sidecar cannot see the app container's processes.
  shareProcessNamespace: true

  containers:
    # ── Target application ────────────────────────────────────────────────────
    - name: app
      image: myapp:latest   # Replace with your actual workload image.

    # ── stracectl sidecar ─────────────────────────────────────────────────────
    - name: stracectl
      image: fabianoflorentino/stracectl:latest
        image: fabianoflorentino/stracectl:latest
      args:
        - attach
        - --serve
        - ":8080"
        - --container
        - app
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: false      # strace/ptrace requires uid 0
        runAsUser: 0
        seccompProfile:
          type: Unconfined      # default Docker seccomp blocks ptrace(2)
        capabilities:
          drop:
            - ALL
          add:
            - SYS_PTRACE        # required: allows strace to attach to processes
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "200m"
          memory: "64Mi"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 2
        periodSeconds: 5
