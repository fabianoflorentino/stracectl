---
# Demo: nginx app + stracectl sidecar
# Requires: shareProcessNamespace: true + CAP_SYS_PTRACE + seccomp Unconfined on sidecar
#
# Deploy:
#   kubectl apply -f deploy/k8s/sidecar-demo.yaml
#   kubectl -n stracectl-sidecar-test port-forward pod/nginx-stracectl 8080:8080
#
# Test:
#   curl http://localhost:8080/healthz
#   curl http://localhost:8080/api/stats | jq .
#   curl http://localhost:8080/metrics
apiVersion: v1
kind: Namespace
metadata:
  name: stracectl-sidecar-test
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-stracectl
  namespace: stracectl-sidecar-test
  labels:
    app: nginx-stracectl
spec:
  # Required: shared PID namespace so the sidecar can see the app process
  shareProcessNamespace: true

  containers:
    # ── Target application ──────────────────────────────────────────────────
    - name: app
      image: registry.k8s.io/e2e-test-images/busybox:1.29-4
      command: ["/bin/sh", "-c", "while true; do sleep 5; done"]

    # ── stracectl sidecar ───────────────────────────────────────────────────
    - name: stracectl
      image: fabianoflorentino/stracectl:v1.0.127
      # For a published Docker Hub tag, allow the cluster to pull it
      imagePullPolicy: IfNotPresent
      # The final image is distroless (no /bin/sh), so run the binary directly.
      # In kind/containerd+cgroupv2, discovery fallback uses comm/cmdline;
      # for busybox with "/bin/sh -c ...", "sh" is a more stable selector.
      args:
        - attach
        - --serve
        - :8080
        - --container
        - sh
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        # distroless generally has a read-only filesystem; tmp can be mounted via emptyDir
        readOnlyRootFilesystem: true
        runAsNonRoot: false  # strace/ptrace requires uid 0
        runAsUser: 0
        # Default Kubernetes seccomp blocks ptrace(2); sidecar must be Unconfined
        seccompProfile:
          type: Unconfined
        capabilities:
          drop: ["ALL"]
          add: ["SYS_PTRACE"]  # required so strace can attach to external processes
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
