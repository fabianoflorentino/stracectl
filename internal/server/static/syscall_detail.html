<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>stracectl · syscall</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding-bottom:60px}
  header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  a.back{color:#58a6ff;text-decoration:none;font-size:.82rem;padding:3px 10px;border:1px solid #30363d;border-radius:6px;background:transparent}
  a.back:hover{background:#21262d}
  .hname{font-size:1.15rem;font-weight:700;font-family:monospace;color:#79c0ff}
  .cat-pill{font-size:.75rem;padding:2px 8px;border-radius:10px;background:#21262d;font-weight:500}
  .cat-IO{color:#79c0ff}.cat-FS{color:#56d364}.cat-NET{color:#f0883e}.cat-MEM{color:#d2a8ff}
  .cat-PROC{color:#ff7b72}.cat-SIG{color:#8b949e}.cat-OTHER{color:#6e7681}

  /* stat cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;padding:24px 24px 0}
  .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px 20px}
  .card .lbl{font-size:.68rem;color:#8b949e;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
  .card .val{font-size:1.8rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
  .card.c-err .val{color:#f85149}
  .card.c-slow .val{color:#e3b341}

  /* reference panel */
  .ref{padding:28px 24px}
  .sec-hdr{font-size:.7rem;font-weight:700;letter-spacing:.12em;color:#8b949e;text-transform:uppercase;
           padding:6px 0 4px;border-bottom:1px solid #30363d;margin-bottom:12px;margin-top:24px}
  .sec-hdr:first-child{margin-top:0}
  .row{display:flex;gap:12px;padding:4px 0;font-size:.83rem}
  .row .k{width:160px;flex-shrink:0;color:#8b949e;font-weight:600}
  .row .v{color:#e6edf3;word-break:break-word}
  .row .v.code{font-family:monospace;color:#79c0ff;font-size:.8rem}
  .row .v.dim{color:#8b949e}
  .row .v.warn{color:#e3b341}
  .no-data{color:#6e7681;font-style:italic}
  .args-table{width:100%;border-collapse:collapse;font-size:.8rem;margin:4px 0}
  .args-table td{padding:4px 10px 4px 0;vertical-align:top;color:#e6edf3}
  .args-table td:first-child{font-family:monospace;color:#79c0ff;width:160px;padding-left:2px}
  .args-table td:last-child{color:#8b949e}

  /* error breakdown */
  .errno-section{padding:0 24px 24px}
  .errno-table{width:auto;border-collapse:collapse;font-size:.82rem;margin-top:4px}
  .errno-table td{padding:3px 16px 3px 0;vertical-align:top;color:#e6edf3}
  .errno-table td:first-child{font-family:monospace;color:#f85149;width:120px}
  .errno-table td:last-child{color:#8b949e}

  #not-found{display:none;padding:48px 24px;text-align:center;color:#8b949e;font-size:1rem}
  #not-found code{font-size:1.2rem;color:#e6edf3;font-family:monospace}
  #status{padding:8px 24px;font-size:.75rem;color:#8b949e;border-top:1px solid #30363d;
          position:fixed;bottom:0;width:100%;background:#0d1117}
  #status.err{color:#f85149}
</style>
</head>
<body>
<header>
  <a class="back" href="/">← Dashboard</a>
  <span class="hname" id="h-name"></span>
  <span id="cat-pill"></span>
</header>

<div id="not-found">
  Syscall <code id="nf-name"></code> not found in the current trace.
</div>

<!-- live stat cards -->
<div class="grid" id="grid">
  <div class="card">
    <div class="lbl">Calls</div>
    <div class="val" id="v-calls">—</div>
  </div>
  <div class="card" id="c-avg">
    <div class="lbl">Avg Latency</div>
    <div class="val" id="v-avg">—</div>
  </div>
  <div class="card">
    <div class="lbl">Min Latency</div>
    <div class="val" id="v-min">—</div>
  </div>
  <div class="card">
    <div class="lbl">P95 Latency</div>
    <div class="val" id="v-p95">—</div>
  </div>
  <div class="card">
    <div class="lbl">P99 Latency</div>
    <div class="val" id="v-p99">—</div>
  </div>
  <div class="card">
    <div class="lbl">Max Latency</div>
    <div class="val" id="v-max">—</div>
  </div>
  <div class="card">
    <div class="lbl">Total Time</div>
    <div class="val" id="v-total">—</div>
  </div>
  <div class="card c-err">
    <div class="lbl">Errors</div>
    <div class="val" id="v-errors">—</div>
  </div>
  <div class="card c-err">
    <div class="lbl">Errors (60 s)</div>
    <div class="val" id="v-err60">—</div>
  </div>
  <div class="card c-err">
    <div class="lbl">Error Rate</div>
    <div class="val" id="v-errpct">—</div>
  </div>
</div>

<!-- syscall reference panel (rendered from static JS table) -->
<div class="ref" id="ref"></div>

<!-- error breakdown (populated from live WebSocket data) -->
<div class="errno-section" id="errno-section" style="display:none">
  <div class="sec-hdr" style="margin-top:0">ERROR BREAKDOWN</div>
  <table class="errno-table" id="errno-table"></table>
</div>

<!-- recent error samples (populated from live WebSocket data) -->
<div class="errno-section" id="samples-section" style="display:none">
  <div class="sec-hdr" style="margin-top:0">RECENT ERROR SAMPLES</div>
  <table class="errno-table" id="samples-table"></table>
</div>

<div id="status">Connecting…</div>

  dup3:{desc:"Duplicate a file descriptor to a specific number with flags.",sig:"dup3(oldfd, newfd, flags) → newfd",ret:"new file descriptor"},
  socket:{desc:"Create a communication endpoint (socket).",sig:"socket(domain, type, protocol) → fd",args:[["domain","AF_INET, AF_INET6, AF_UNIX, AF_NETLINK, …"],["type","SOCK_STREAM, SOCK_DGRAM, SOCK_RAW | SOCK_NONBLOCK | SOCK_CLOEXEC"],["protocol","0 (auto), IPPROTO_TCP, IPPROTO_UDP, …"]],ret:"new socket fd"},
  bind:{desc:"Assign a local address to a socket.",sig:"bind(sockfd, addr, addrlen) → 0",args:[["addr","local address to bind (port + IP or Unix path)"]],err:"EADDRINUSE (port already in use), EACCES (port < 1024 without CAP_NET_BIND_SERVICE)"},
  listen:{desc:"Mark a socket as passive (ready to accept connections).",sig:"listen(sockfd, backlog) → 0",args:[["backlog","max length of pending connection queue"]]},
  setsockopt:{desc:"Set socket options (timeouts, buffers, TCP_NODELAY, SO_REUSEADDR, …).",sig:"setsockopt(sockfd, level, optname, optval, optlen) → 0",args:[["level","SOL_SOCKET, IPPROTO_TCP, IPPROTO_IP, …"],["optname","SO_REUSEADDR, SO_KEEPALIVE, TCP_NODELAY, SO_RCVBUF, …"]]},
  getsockopt:{desc:"Get a socket option.",sig:"getsockopt(sockfd, level, optname, optval, optlen) → 0",args:[["level","SOL_SOCKET, IPPROTO_TCP, …"],["optname","SO_REUSEADDR, TCP_NODELAY, …"]]},
  getsockname:{desc:"Get the local address of a socket.",sig:"getsockname(sockfd, addr, addrlen) → 0",ret:"0"},
  getpeername:{desc:"Get the remote address of a connected socket.",sig:"getpeername(sockfd, addr, addrlen) → 0",ret:"0"},
  getrandom:{desc:"Obtain cryptographically secure random bytes from the kernel.",sig:"getrandom(buf, buflen, flags) → bytes_filled",args:[["flags","0 (block until entropy ready), GRND_NONBLOCK, GRND_RANDOM"]],notes:"Preferred over /dev/urandom. Called at startup by TLS libraries and language runtimes for seed material."},
  statfs:{desc:"Get filesystem statistics (type, free space, block size, …).",sig:"statfs(pathname, buf) → 0",args:[["pathname","path on the filesystem to inspect"],["buf","struct statfs to fill"]],err:"ENOENT, EACCES, ENOSYS (on special filesystems like /proc)",notes:"Errors on /proc or /sys are expected — those filesystems may not support statfs."},
  fstatfs:{desc:"Get filesystem statistics for an open file descriptor.",sig:"fstatfs(fd, buf) → 0",err:"ENOSYS (on special filesystems)"},
  fcntl:{desc:"Perform miscellaneous operations on a file descriptor (flags, locks, async I/O).",sig:"fcntl(fd, cmd, arg) → value",args:[["cmd","F_GETFL, F_SETFL (O_NONBLOCK), F_GETFD, F_SETFD (FD_CLOEXEC), F_DUPFD, F_SETLK, …"]]},
  sendfile:{desc:"Transfer data between two file descriptors entirely in kernel space.",sig:"sendfile(out_fd, in_fd, offset, count) → bytes_sent",notes:"Zero-copy: data never crosses user space. Used by web servers to send file contents over sockets."},
  copy_file_range:{desc:"Copy a range of bytes from one file to another in kernel space.",sig:"copy_file_range(fd_in, off_in, fd_out, off_out, len, flags) → bytes_copied",notes:"Zero-copy between files. More efficient than read+write for large file copies."},
  prlimit64:{desc:"Get or set resource limits (CPU, memory, open files, …) for a process.",sig:"prlimit64(pid, resource, new_limit, old_limit) → 0",args:[["resource","RLIMIT_NOFILE, RLIMIT_AS, RLIMIT_STACK, RLIMIT_CORE, …"],["pid","0 = calling process"]]},
  eventfd:{desc:"Create a file descriptor for event notification between threads/processes.",sig:"eventfd(initval, flags) → fd",args:[["initval","initial counter value"],["flags","EFD_NONBLOCK, EFD_CLOEXEC, EFD_SEMAPHORE"]],notes:"Used by Go runtime and libuv/libevent to wake up blocked pollers without a pipe."},
  eventfd2:{desc:"Create a file descriptor for event notification (extended).",sig:"eventfd2(initval, flags) → fd",notes:"Used by Go runtime and libuv/libevent to wake up blocked pollers without a pipe."},
  set_tid_address:{desc:"Set the address that the kernel will clear when the thread exits.",sig:"set_tid_address(tidptr) → tid",notes:"Called once at thread startup by glibc. Used for robust futex cleanup on thread exit."},
  arch_prctl:{desc:"Set architecture-specific thread state (e.g. FS/GS segment base for TLS).",sig:"arch_prctl(code, addr) → 0",args:[["code","ARCH_SET_FS (set FS base for thread-local storage), ARCH_GET_FS, …"]],notes:"Called once per thread by glibc to initialise thread-local storage (TLS). Normal during startup."},
  readlink:{desc:"Read the target of a symbolic link.",sig:"readlink(pathname, buf, bufsiz) → bytes_written",args:[["pathname","path to the symlink"],["buf","buffer for the target string"],["bufsiz","buffer size"]],ret:"number of bytes placed in buf",err:"ENOENT (no such symlink), EINVAL (not a symlink), EACCES"},
  readlinkat:{desc:"Read the target of a symbolic link (relative to dirfd).",sig:"readlinkat(dirfd, pathname, buf, bufsiz) → bytes_written",ret:"number of bytes placed in buf",err:"ENOENT, EINVAL, EACCES"},
  mkdir:{desc:"Create a directory.",sig:"mkdir(pathname, mode) → 0",args:[["pathname","path of directory to create"],["mode","permission bits"]],ret:"0",err:"EEXIST (already exists), EACCES, ENOENT (parent missing)"},
  mkdirat:{desc:"Create a directory (relative to dirfd).",sig:"mkdirat(dirfd, pathname, mode) → 0",ret:"0",err:"EEXIST, EACCES, ENOENT"},
  rmdir:{desc:"Remove an empty directory.",sig:"rmdir(pathname) → 0",ret:"0",err:"ENOTEMPTY (not empty), ENOENT, EACCES"},
  unlink:{desc:"Delete a name from the filesystem (and possibly the file).",sig:"unlink(pathname) → 0",ret:"0",err:"ENOENT, EACCES, EISDIR"},
  unlinkat:{desc:"Delete a name from the filesystem (relative to dirfd).",sig:"unlinkat(dirfd, pathname, flags) → 0",ret:"0",err:"ENOENT, EACCES"},
  rename:{desc:"Rename a file or directory.",sig:"rename(oldpath, newpath) → 0",ret:"0",err:"ENOENT, EXDEV (cross-device), EACCES, EISDIR"},
  renameat:{desc:"Rename a file or directory (relative to dirfds).",sig:"renameat(olddirfd, oldpath, newdirfd, newpath) → 0",ret:"0",err:"ENOENT, EXDEV, EACCES"},
  renameat2:{desc:"Rename a file or directory with additional flags.",sig:"renameat2(olddirfd, oldpath, newdirfd, newpath, flags) → 0",args:[["flags","RENAME_NOREPLACE, RENAME_EXCHANGE, RENAME_WHITEOUT"]],ret:"0",err:"ENOENT, EXDEV, EEXIST (RENAME_NOREPLACE)"},
  chmod:{desc:"Change file permissions.",sig:"chmod(pathname, mode) → 0",ret:"0",err:"ENOENT, EACCES, EPERM"},
  fchmod:{desc:"Change permissions on an open file descriptor.",sig:"fchmod(fd, mode) → 0",ret:"0",err:"EBADF, EPERM"},
  chown:{desc:"Change file owner and group.",sig:"chown(pathname, owner, group) → 0",ret:"0",err:"EPERM (not root), ENOENT"},
  fchown:{desc:"Change owner and group on an open file descriptor.",sig:"fchown(fd, owner, group) → 0",ret:"0",err:"EBADF, EPERM"},
  lchown:{desc:"Change owner and group (does not follow symlinks).",sig:"lchown(pathname, owner, group) → 0",ret:"0",err:"EPERM, ENOENT"},
  truncate:{desc:"Truncate a file to a specified length.",sig:"truncate(pathname, length) → 0",ret:"0",err:"ENOENT, EACCES, EISDIR"},
  ftruncate:{desc:"Truncate an open file to a specified length.",sig:"ftruncate(fd, length) → 0",ret:"0",err:"EBADF, EINVAL"},
  fsync:{desc:"Synchronise file data and metadata to storage.",sig:"fsync(fd) → 0",ret:"0",err:"EBADF, EIO (write failure)",notes:"Never ignore EIO from fsync — it means data was not persisted."},
  fdatasync:{desc:"Synchronise file data to storage (no metadata flush).",sig:"fdatasync(fd) → 0",ret:"0",err:"EBADF, EIO"},
  sync:{desc:"Flush all pending filesystem writes to storage.",sig:"sync() → void",notes:"Affects the entire system. Prefer fsync() on a specific fd."},
  getcwd:{desc:"Get the current working directory.",sig:"getcwd(buf, size) → buf",ret:"pointer to buf",err:"ERANGE (buffer too small), ENOENT (cwd deleted)"},
  chdir:{desc:"Change the working directory.",sig:"chdir(path) → 0",ret:"0",err:"ENOENT, EACCES, ENOTDIR"},
  fchdir:{desc:"Change working directory to that of an open file descriptor.",sig:"fchdir(fd) → 0",ret:"0",err:"EBADF, ENOTDIR"},
  pread64:{desc:"Read from a file descriptor at a given offset, without moving the file position.",sig:"pread64(fd, buf, count, offset) → bytes_read",ret:"bytes read",err:"EBADF, ESPIPE (pipes/sockets)"},
  pwrite64:{desc:"Write to a file descriptor at a given offset, without moving the file position.",sig:"pwrite64(fd, buf, count, offset) → bytes_written",ret:"bytes written",err:"EBADF, ESPIPE"},
  readv:{desc:"Read from a file descriptor into multiple buffers (scatter I/O).",sig:"readv(fd, iov, iovcnt) → bytes_read",ret:"total bytes read",err:"EBADF, EINVAL"},
  writev:{desc:"Write from multiple buffers to a file descriptor (gather I/O).",sig:"writev(fd, iov, iovcnt) → bytes_written",ret:"total bytes written",err:"EBADF, EINVAL"},
  kill:{desc:"Send a signal to a process.",sig:"kill(pid, sig) → 0",args:[["pid","target process (negative = process group, 0 = own group)"],["sig","signal number (0 = existence check only)"]],ret:"0",err:"EPERM, ESRCH (process not found)"},
  tgkill:{desc:"Send a signal to a specific thread in a thread group.",sig:"tgkill(tgid, tid, sig) → 0",ret:"0",err:"EPERM, ESRCH"},

  rt_sigreturn:{desc:"Return from a signal handler (called automatically by the C library).",sig:"rt_sigreturn() → (restores process state)"},

  clock_nanosleep:{desc:"Sleep for a specified time, with clock and flag selection.",sig:"clock_nanosleep(clockid, flags, req, rem) → 0",args:[["clockid","CLOCK_REALTIME, CLOCK_MONOTONIC, …"],["flags","0 (relative) or TIMER_ABSTIME (absolute)"]],ret:"0 or errno",err:"EINTR (interrupted by signal)"},

  getrlimit:{desc:"Get resource limits for the calling process.",sig:"getrlimit(resource, rlim) → 0",args:[["resource","RLIMIT_NOFILE, RLIMIT_AS, RLIMIT_STACK, …"]],ret:"0"},

  ptrace:{desc:"Trace/control another process — used by debuggers and strace itself.",sig:"ptrace(request, pid, addr, data) → long",args:[["request","PTRACE_ATTACH, PTRACE_CONT, PTRACE_PEEKDATA, PTRACE_GETREGS, …"]],err:"EPERM (not permitted), ESRCH (no such process)",notes:"stracectl itself uses ptrace to trace the target process."},
};

// ── page init ─────────────────────────────────────────────────────────────────
const NAME = decodeURIComponent(location.pathname.replace(/^\/syscall\//, ''));
document.title = 'stracectl · ' + NAME;
document.getElementById('h-name').textContent = NAME;
document.getElementById('nf-name').textContent = NAME;

// ── formatting helpers ────────────────────────────────────────────────────────
const fmtDur = ns => {
  if (!ns) return '—';
  if (ns < 1e3) return ns + 'ns';
  if (ns < 1e6) return (ns/1e3).toFixed(1) + 'µs';
  if (ns < 1e9) return (ns/1e6).toFixed(1) + 'ms';
  return (ns/1e9).toFixed(2) + 's';
};
const fmtN = n => {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
  return '' + n;
};
const catClass = c => 'cat-' + c.replace('/','');
const esc = s => s.replace(/</g,'&lt;').replace(/>/g,'&gt;');

// render static reference panel (must be after esc/row helpers are defined)
renderRef(NAME);

// ── reference panel renderer ──────────────────────────────────────────────────
function renderRef(name) {
  const info = REF[name];
  const el = document.getElementById('ref');
  if (!info) {
    el.innerHTML =
      '<div class="sec-hdr">SYSCALL REFERENCE</div>' +
      '<div class="row"><span class="v dim">No reference entry available for <code>' + esc(name) + '</code>.</span></div>' +
      '<div class="row"><span class="v dim">Run <code>man 2 ' + esc(name) + '</code> for full documentation.</span></div>';
    return;
  }
  let h = '<div class="sec-hdr">SYSCALL REFERENCE</div>';
  h += row('Description', '<span class="v">' + esc(info.desc) + '</span>');
  if (info.sig) h += row('Signature', '<span class="v code">' + esc(info.sig) + '</span>');
  if (info.args && info.args.length) {
    h += '<div class="sec-hdr">ARGUMENTS</div>';
    h += '<table class="args-table">';
    info.args.forEach(([k,v]) => { h += '<tr><td>' + esc(k) + '</td><td>' + esc(v) + '</td></tr>'; });
    h += '</table>';
  }
  if (info.ret) {
    h += '<div class="sec-hdr">RETURN VALUE</div>';
    h += row('On success', '<span class="v">' + esc(info.ret) + '</span>');
    if (info.err) {
      h += row('On error', '<span class="v">-1, errno set</span>');
      h += row('Common errors', '<span class="v warn">' + esc(info.err) + '</span>');
    }
  } else if (info.err) {
    h += '<div class="sec-hdr">COMMON ERRORS</div>';
    h += row('', '<span class="v warn">' + esc(info.err) + '</span>');
  }
  if (info.notes) {
    h += '<div class="sec-hdr">NOTES</div>';
    h += '<div class="row"><span class="v">' + esc(info.notes) + '</span></div>';
  }
  el.innerHTML = h;
}
function row(label, valueHTML) {
  return '<div class="row"><span class="k">' + esc(label) + '</span>' + valueHTML + '</div>';
}

// ── live stats updater ────────────────────────────────────────────────────────
function update(r) {
  const grid = document.getElementById('grid');
  const notFound = document.getElementById('not-found');
  if (!r) {
    notFound.style.display = 'block';
    grid.style.display = 'none';
    return;
  }
  notFound.style.display = 'none';
  grid.style.display = 'grid';

  const avgNs  = r.Count ? Math.round(r.TotalTime / r.Count) : 0;
  const errPct = r.Count ? (r.Errors / r.Count * 100) : 0;

  const pill = document.getElementById('cat-pill');
  pill.textContent = r.Category;
  pill.className = 'cat-pill ' + catClass(r.Category);

  document.getElementById('v-calls').textContent  = fmtN(r.Count);
  document.getElementById('v-avg').textContent    = fmtDur(avgNs);
  document.getElementById('v-min').textContent    = fmtDur(r.MinTime);
  document.getElementById('v-p95').textContent    = fmtDur(r.P95);
  document.getElementById('v-p99').textContent    = fmtDur(r.P99);
  document.getElementById('v-max').textContent    = fmtDur(r.MaxTime);
  document.getElementById('v-total').textContent  = fmtDur(r.TotalTime);
  document.getElementById('v-errors').textContent = r.Errors ? fmtN(r.Errors) : '—';
  document.getElementById('v-err60').textContent  = r.ErrRate60s ? fmtN(r.ErrRate60s) : '—';
  document.getElementById('v-errpct').textContent = r.Errors ? errPct.toFixed(1) + '%' : '—';

  // colour avg card only when slow (≥5 ms)
  document.getElementById('c-avg').className = 'card' + (avgNs >= 5e6 ? ' c-slow' : '');

  // error breakdown table
  const bd = r.ErrorBreakdown;
  const sec = document.getElementById('errno-section');
  const tbl = document.getElementById('errno-table');
  if (bd && Object.keys(bd).length > 0) {
    const entries = Object.entries(bd).sort((a, b) => b[1] - a[1]);
    tbl.innerHTML = entries.map(([errno, cnt]) => {
      const pct = r.Count ? (cnt / r.Count * 100).toFixed(1) : '0';
      return '<tr><td>' + esc(errno) + '</td><td>' + fmtN(cnt) + ' calls</td><td>' + pct + '%</td></tr>';
    }).join('');
    sec.style.display = '';
  } else {
    sec.style.display = 'none';
  }

  // recent error samples
  const samples = r.RecentErrors;
  const samplesSec = document.getElementById('samples-section');
  const samplesTbl = document.getElementById('samples-table');
  if (samples && samples.length > 0) {
    samplesTbl.innerHTML = samples.map(s => {
      const ts = s.Time ? new Date(s.Time).toLocaleTimeString() : '';
      const raw = (s.Args !== undefined && s.Args !== null) ? s.Args : '';
      const truncated = raw.length > 80 ? raw.slice(0,77) + '…' : (raw || '<no data>');
      const argsHtml = (truncated === '<no data>') ? ('<span class="no-data">' + esc(truncated) + '</span>') : esc(truncated);
      return '<tr><td style="color:#8b949e;font-family:monospace">' + esc(ts) + '</td>' +
             '<td>' + esc(s.Errno) + '</td>' +
             '<td style="color:#8b949e;font-family:monospace;font-size:.78rem;max-width:500px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + argsHtml + '</td></tr>';
    }).join('');
    samplesSec.style.display = '';
  } else {
    samplesSec.style.display = 'none';
  }
}

// ── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(proto + '://' + location.host + '/stream');

  ws.onopen = () => {
    document.getElementById('status').textContent = 'Connected — live updates every second';
    document.getElementById('status').classList.remove('err');
  };

  ws.onmessage = e => {
    const rows = JSON.parse(e.data) || [];
    const row = rows.find(r => r.Name === NAME) || null;
    update(row);
  };

  ws.onerror = () => {
    document.getElementById('status').textContent = 'WebSocket error — retrying…';
    document.getElementById('status').classList.add('err');
  };

  ws.onclose = () => {
    document.getElementById('status').textContent = 'Disconnected — reconnecting in 2 s…';
    document.getElementById('status').classList.add('err');
    setTimeout(connect, 2000);
  };
}

connect();
</script>
