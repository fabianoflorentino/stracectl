<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>stracectl</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
  header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;gap:16px}
  header h1{font-size:1.1rem;font-weight:600;color:#58a6ff}
  #proc-info{font-size:.8rem;color:#8b949e;font-family:monospace;margin-left:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:40vw}
  #meta{margin-left:auto;font-size:.8rem;color:#8b949e;display:flex;gap:20px}
  #meta span b{color:#e6edf3}
  .bar-wrap{background:#161b22;border-bottom:1px solid #30363d;padding:10px 24px;display:flex;gap:20px;flex-wrap:wrap}
  .cat-pill{font-size:.75rem;padding:2px 8px;border-radius:10px;background:#21262d;font-weight:500}
  .cat-IO{color:#79c0ff}.cat-FS{color:#56d364}.cat-NET{color:#f0883e}.cat-MEM{color:#d2a8ff}
  .cat-PROC{color:#ff7b72}.cat-SIG{color:#8b949e}.cat-OTHER{color:#6e7681}
  .wrap{padding:8px 24px 60px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.82rem;table-layout:fixed}
  thead th{text-align:left;padding:6px 10px;color:#8b949e;font-weight:600;border-bottom:1px solid #30363d;white-space:nowrap;cursor:pointer;user-select:none;overflow:hidden;text-overflow:ellipsis}
  thead th.rnum{text-align:right}
  thead th.spark-col{width:100px;cursor:default}
  thead th:hover{color:#e6edf3}
  thead th.asc::after{content:" ▲"}
  thead th.desc::after{content:" ▼"}
  tbody tr{border-bottom:1px solid #161b22;transition:background .1s;cursor:pointer}
  tbody tr:hover{background:#161b22}
  td{padding:5px 10px;white-space:nowrap}
  td.name{font-family:monospace;color:#79c0ff}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  td.err{text-align:right;color:#f85149}
  td.slow{color:#e3b341}
  .spark{display:inline-block;width:80px;height:8px;background:#21262d;border-radius:2px;vertical-align:middle}
  .spark-fill{height:100%;background:#1f6feb;border-radius:2px}
  #status{padding:8px 24px;font-size:.75rem;color:#8b949e;border-top:1px solid #30363d;position:fixed;bottom:0;width:100%;background:#0d1117}
  #status.err{color:#f85149}
  .tag{font-size:.7rem;padding:1px 6px;border-radius:8px;margin-left:4px}
  #alerts-section{display:none;padding:8px 24px;border-bottom:1px solid #30363d}
  #alerts-hdr{font-size:.75rem;font-weight:700;color:#f85149;margin-bottom:4px;letter-spacing:.05em}
  .alert-row{font-size:.82rem;padding:3px 0;font-family:monospace}
  .alert-row.hot{color:#f85149}
  .alert-row.slow{color:#e3b341}
  /* tab bar — pill style matching category bar */
  .tabs{background:#161b22;border-bottom:1px solid #30363d;padding:8px 24px;display:flex;gap:10px;flex-wrap:wrap}
  .tab-btn{font-size:.75rem;padding:3px 10px;border-radius:10px;background:#21262d;font-weight:600;cursor:pointer;border:none;color:#8b949e;transition:background .15s,color .15s;letter-spacing:.02em}
  .tab-btn.active{background:#1f6feb;color:#fff}
  .tab-btn:hover:not(.active){background:#30363d;color:#e6edf3}
  /* log panel */
  #log-panel{display:none;padding:0 24px 60px;overflow-x:auto}
  #log-wrap{max-height:calc(100vh - 180px);overflow-y:auto;margin-top:12px}
  #log-table{width:100%;border-collapse:collapse;font-size:.78rem;font-family:monospace}
  #log-table td{padding:2px 8px;white-space:nowrap;color:#8b949e}
  #log-table tr.error td{color:#f85149}
  #log-table td.l-name{color:#79c0ff;width:120px}
  #log-table td.l-ts{width:100px;color:#6e7681}
  #log-table td.l-args{color:#8b949e;max-width:600px;overflow:hidden;text-overflow:ellipsis}
  /* process exited banner */
  #done-banner{display:none;padding:8px 24px;background:#3d2f00;border-bottom:2px solid #e3b341;
               font-size:.82rem;color:#e3b341;font-weight:600;letter-spacing:.03em}
  /* search bar */
  #search-bar{padding:14px 24px 8px 34px;background:#0d1117;display:flex;align-items:center;gap:8px}
  #search-input{background:#21262d;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-family:monospace;font-size:.82rem;padding:5px 10px;width:220px;outline:none}
  #search-input:focus{border-color:#58a6ff}
  #search-label{font-size:.78rem;color:#8b949e}
  #search-clear{cursor:pointer;color:#8b949e;font-size:.9rem;display:none;background:none;border:none;padding:0 4px;line-height:1}
  #search-clear:hover{color:#e6edf3}
  #search-count{font-size:.75rem;color:#8b949e;margin-left:4px}
</style>
</head>
<body>
<header>
  <h1>stracectl</h1>
  <span id="proc-info"></span>
  <div id="meta">
    <span>syscalls: <b id="m-total">—</b></span>
    <span>rate: <b id="m-rate">—</b>/s</span>
    <span>errors: <b id="m-errors">—</b></span>
    <span>unique: <b id="m-unique">—</b></span>
  </div>
</header>
<div id="done-banner">&#x23F9; Process exited — trace complete. Data frozen.</div>
<div class="bar-wrap" id="cat-bar"></div>
<div id="alerts-section">
  <div id="alerts-hdr">⚠ ANOMALY ALERTS</div>
  <div id="alerts-list"></div>
</div>
<div class="tabs">
  <button class="tab-btn active" id="tab-stats" onclick="switchTab('stats')">SYSCALL STATS</button>
  <button class="tab-btn" id="tab-log" onclick="switchTab('log')">LIVE LOG</button>
</div>
<div id="search-bar">
  <span id="search-label">FILTER:</span>
  <input id="search-input" type="text" placeholder="syscall name…" autocomplete="off" spellcheck="false">
  <button id="search-clear" title="Clear filter">&#x2715;</button>
  <span id="search-count"></span>
</div>
<div class="wrap" id="stats-panel">
<table>
  <thead>
    <tr>
      <th data-col="Name" style="width:22%">SYSCALL</th>
      <th data-col="Category" style="width:80px">CAT</th>
      <th data-col="Count" class="desc rnum" style="width:7%">CALLS</th>
      <th data-col="_bar" class="spark-col"></th>
      <th data-col="AvgTime" class="rnum" style="width:8%">AVG</th>
      <th data-col="MaxTime" class="rnum" style="width:8%">MAX</th>
      <th data-col="TotalTime" class="rnum" style="width:9%">TOTAL</th>
      <th data-col="Errors" class="rnum" style="width:8%">ERRORS</th>
      <th data-col="_erp" class="rnum" style="width:6%">ERR%</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>
<div id="log-panel">
  <div id="log-wrap">
    <table id="log-table"><tbody id="log-tbody"></tbody></table>
  </div>
</div>
<div id="status">Connecting…</div>

<script>
let currentTab = 'stats';

function switchTab(name) {
  currentTab = name;
  document.getElementById('stats-panel').style.display = name === 'stats' ? '' : 'none';
  document.getElementById('search-bar').style.display  = name === 'stats' ? 'flex' : 'none';
  document.getElementById('log-panel').style.display   = name === 'log'   ? 'block' : 'none';
  document.getElementById('tab-stats').classList.toggle('active', name === 'stats');
  document.getElementById('tab-log').classList.toggle('active', name === 'log');
  if (name === 'log') fetchLog();
}

function fetchLog() {
  fetch('/api/log').then(r => r.json()).then(entries => {
    if (!entries) return;
    const tbody = document.getElementById('log-tbody');
    tbody.innerHTML = entries.slice(-500).map(e => {
      const ts   = e.Time ? new Date(e.Time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit',fractionalSecondDigits:3}) : '';
      const args = e.Args ? (e.Args.length > 120 ? e.Args.slice(0,117)+'\u2026' : e.Args) : '';
      return '<tr' + (e.Error ? ' class="error"' : '') + '>' +
        '<td class="l-ts">' + esc(ts) + '</td>' +
        '<td class="l-name">' + esc(e.Name) + '</td>' +
        '<td class="l-args">' + esc(args) + (e.Error ? ' \u2192 <b>' + esc(e.Error) + '</b>' : '') + '</td>' +
        '</tr>';
    }).join('');
    // auto-scroll to bottom
    const wrap = document.getElementById('log-wrap');
    wrap.scrollTop = wrap.scrollHeight;
  }).catch(() => {});
}

// poll log when tab is visible
setInterval(() => { if (currentTab === 'log') fetchLog(); }, 1000);

function fetchStatus() {
  fetch('/api/status').then(r => r.json()).then(s => {
    const p = s.Proc;
    const el = document.getElementById('proc-info');
    if (p && p.Comm) {
      let label = p.Comm + '[' + p.PID + ']';
      if (p.Cwd) label += '  \u2022  ' + escapeHtml(p.Cwd);
      el.textContent = label;
      el.title = p.Cmdline || '';
    }
  }).catch(() => {});
}

const escapeHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const esc = escapeHtml;

function alertExplanation(name) {
  const m = {
    'ioctl':'terminal control failed — process likely has no TTY (running under sudo or piped)',
    'openat':'files not found — often normal (dynamic linker searches multiple paths)',
    'open':'files not found — often normal (dynamic linker searches multiple paths)',
    'access':'optional files are missing — usually harmless (checking for config files)',
    'faccessat':'optional files are missing — usually harmless (checking for config files)',
    'connect':'connection attempts failed — may be Happy Eyeballs (IPv4/IPv6 race) or no route',
    'recvfrom':'EAGAIN on non-blocking socket — normal for async I/O, not a real error',
    'recv':'EAGAIN on non-blocking socket — normal for async I/O, not a real error',
    'recvmsg':'EAGAIN on non-blocking socket — normal for async I/O, not a real error',
    'sendto':'send failed — peer may have closed the connection',
    'send':'send failed — peer may have closed the connection',
    'sendmsg':'send failed — peer may have closed the connection',
    'madvise':'memory hint rejected by kernel — informational, not a real failure',
    'prctl':'process control rejected — may lack capabilities (seccomp or container policy)',
    'statfs':'filesystem stat failed — path may be on a special fs (proc, tmpfs)',
    'fstatfs':'filesystem stat failed — path may be on a special fs (proc, tmpfs)',
    'unlink':'tried to delete a non-existent file — may be cleanup of temp files',
    'unlinkat':'tried to delete a non-existent file — may be cleanup of temp files',
    'mkdir':'directory already exists — common during first-run initialisation',
    'mkdirat':'directory already exists — common during first-run initialisation',
  };
  return m[name] || '';
}

function updateAlerts(rows) {
  const alerts = [];
  rows.forEach(r => {
    const errPct = r.Count ? (r.Errors / r.Count * 100) : 0;
    const avgNs  = r.Count ? Math.round(r.TotalTime / r.Count) : 0;
    if (errPct >= 50) {
      const expl = alertExplanation(r.Name);
      let msg = '⚠  ' + r.Name + ': ' + errPct.toFixed(0) + '% error rate (' + r.Errors + '/' + r.Count + ' calls)';
      if (expl) msg += ' — ' + expl;
      alerts.push({type:'hot', msg});
    } else if (avgNs >= 5e6) {
      alerts.push({type:'slow', msg: '⚡  ' + r.Name + ': slow avg ' + fmtDur(avgNs) + ' (max ' + fmtDur(r.MaxTime) + ') — kernel spending time in this call'});
    }
  });
  const section = document.getElementById('alerts-section');
  if (alerts.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  document.getElementById('alerts-hdr').textContent = '⚠  ANOMALY ALERTS (' + alerts.length + ')';
  document.getElementById('alerts-list').innerHTML = alerts.map(a =>
    '<div class="alert-row ' + a.type + '">' + escapeHtml(a.msg) + '</div>'
  ).join('');
}

const fmtDur = ns => {
  if (!ns) return '—';
  if (ns < 1e3) return ns + 'ns';
  if (ns < 1e6) return (ns/1e3).toFixed(1) + 'µs';
  if (ns < 1e9) return (ns/1e6).toFixed(1) + 'ms';
  return (ns/1e9).toFixed(2) + 's';
};
const fmtN = n => {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
  return '' + n;
};
const catClass = c => 'cat-' + c.replace('/','');
const CAT_ORDER = ['I/O','FS','NET','MEM','PROC','SIG','OTHER'];

let sortCol = 'Count', sortDir = -1;
let lastData = [];
let filterQuery = '';

document.getElementById('search-input').addEventListener('input', e => {
  filterQuery = e.target.value.toLowerCase().trim();
  document.getElementById('search-clear').style.display = filterQuery ? '' : 'none';
  document.getElementById('search-count').textContent = '';
  render(lastData);
});
document.getElementById('search-clear').addEventListener('click', () => {
  filterQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-count').textContent = '';
  render(lastData);
});

function sortData(rows) {
  return [...rows].sort((a,b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (sortCol === '_erp') { av = a.Count ? a.Errors/a.Count : 0; bv = b.Count ? b.Errors/b.Count : 0; }
    if (sortCol === 'AvgTime') { av = a.Count ? a.TotalTime/a.Count : 0; bv = b.Count ? b.TotalTime/b.Count : 0; }
    if (sortCol === '_bar') { av = a.Count; bv = b.Count; }
    if (sortCol === 'Category') { av = CAT_ORDER.indexOf(a.Category); bv = CAT_ORDER.indexOf(b.Category); }
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * ((av||0) - (bv||0));
  });
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/\//g, '&#x2F;');
}

function render(rows) {
  const filtered = filterQuery ? rows.filter(r => r.Name.toLowerCase().includes(filterQuery)) : rows;
  const countEl = document.getElementById('search-count');
  if (filterQuery) {
    countEl.textContent = filtered.length + ' / ' + rows.length;
  } else {
    countEl.textContent = '';
  }
  const maxCount = filtered.reduce((m,r) => Math.max(m, r.Count), 0);
  const tbody = document.getElementById('tbody');
  const sorted = sortData(filtered);
  tbody.innerHTML = sorted.map(r => {
    const errPct = r.Count ? (r.Errors / r.Count * 100) : 0;
    const avgNs  = r.Count ? Math.round(r.TotalTime / r.Count) : 0;
    const pct    = maxCount ? Math.round(r.Count / maxCount * 100) : 0;
    const slow   = avgNs >= 5e6;
    const safeName = escapeHtml(r.Name);
    const safeCategory = escapeHtml(r.Category);
    return '<tr data-name="' + safeName + '">' +
      '<td class="name">' + safeName + '</td>' +
      '<td><span class="cat-pill ' + catClass(r.Category) + '">' + safeCategory + '</span></td>' +
      '<td class="num">' + fmtN(r.Count) + '</td>' +
      '<td><div class="spark"><div class="spark-fill" style="width:' + pct + '%"></div></div></td>' +
      '<td class="num' + (slow?' slow':'') + '">' + fmtDur(avgNs) + '</td>' +
      '<td class="num">' + fmtDur(r.MaxTime) + '</td>' +
      '<td class="num">' + fmtDur(r.TotalTime) + '</td>' +
      '<td class="num err">' + (r.Errors || '—') + '</td>' +
      '<td class="num err">' + (r.Errors ? errPct.toFixed(0)+'%' : '—') + '</td>' +
      '</tr>';
  }).join('');
}

function updateMeta(rows) {
  const total  = rows.reduce((s,r) => s + r.Count, 0);
  const errors = rows.reduce((s,r) => s + r.Errors, 0);
  document.getElementById('m-total').textContent  = fmtN(total);
  document.getElementById('m-errors').textContent = fmtN(errors);
  document.getElementById('m-unique').textContent = rows.length;
}

function updateCatBar(rows) {
  const total = rows.reduce((s,r) => s + r.Count, 0);
  const cats  = {};
  rows.forEach(r => { cats[r.Category] = (cats[r.Category]||0) + r.Count; });
  document.getElementById('cat-bar').innerHTML = CAT_ORDER
    .filter(c => cats[c])
    .map(c => {
      const pct = total ? (cats[c]/total*100).toFixed(0) : 0;
      return '<span class="cat-pill ' + catClass(c) + '">' + c + ' ' + pct + '%</span>';
    }).join('');
}

// sort header clicks
document.querySelector('thead').addEventListener('click', e => {
  const th = e.target.closest('th');
  if (!th || !th.dataset.col) return;
  if (sortCol === th.dataset.col) { sortDir *= -1; }
  else { sortCol = th.dataset.col; sortDir = -1; }
  document.querySelectorAll('thead th').forEach(t => t.classList.remove('asc','desc'));
  th.classList.add(sortDir === -1 ? 'desc' : 'asc');
  render(lastData);
});

// row click → detail page
document.getElementById('tbody').addEventListener('click', e => {
  const tr = e.target.closest('tr');
  if (tr && tr.dataset.name) location.href = '/syscall/' + encodeURIComponent(tr.dataset.name);
});

// rate from successive snapshots
let prevTotal = 0, prevTs = Date.now();
let processExited = false;

function showDoneBanner() {
  processExited = true;
  const b = document.getElementById('done-banner');
  const ts = new Date().toLocaleTimeString();
  b.textContent = '\u23F9 Process exited at ' + ts + ' — trace complete. Data frozen.';
  b.style.display = 'block';
  document.getElementById('status').textContent = 'Process exited — data frozen';
  document.getElementById('status').classList.remove('err');
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(proto + '://' + location.host + '/stream');

  ws.onopen = () => {
    document.getElementById('status').textContent = 'Connected — live updates every second';
    document.getElementById('status').classList.remove('err');
    fetchStatus();
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    // Sentinel: server signals the traced process has exited.
    if (msg && !Array.isArray(msg) && msg.done === true) {
      showDoneBanner();
      ws.close();
      return;
    }
    const rows = Array.isArray(msg) ? msg : [];
    lastData = rows;
    const now = Date.now();
    const total = rows.reduce((s,r) => s + r.Count, 0);
    const rate  = prevTs !== now ? Math.round((total - prevTotal) / ((now - prevTs) / 1000)) : 0;
    prevTotal = total; prevTs = now;
    document.getElementById('m-rate').textContent = fmtN(Math.max(0, rate));
    updateMeta(rows);
    updateCatBar(rows);
    updateAlerts(rows);
    render(rows);
  };

  ws.onerror = () => {
    document.getElementById('status').textContent = 'WebSocket error — retrying\u2026';
    document.getElementById('status').classList.add('err');
  };

  ws.onclose = () => {
    if (processExited) return; // process exited cleanly — do not reconnect
    document.getElementById('status').textContent = 'Disconnected — reconnecting in 2 s\u2026';
    document.getElementById('status').classList.add('err');
    setTimeout(connect, 2000);
  };
}

connect();
</script>
</body>
</html>
