<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>stracectl</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
  header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;gap:16px}
  header h1{font-size:1.1rem;font-weight:600;color:#58a6ff}
  #proc-info{font-size:.8rem;color:#8b949e;font-family:monospace;margin-left:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:40vw}
  #meta{margin-left:auto;font-size:.8rem;color:#8b949e;display:flex;gap:20px}
  #meta span b{color:#e6edf3}
  .bar-wrap{background:#161b22;border-bottom:1px solid #30363d;padding:10px 24px;display:flex;gap:20px;flex-wrap:wrap}
  .cat-pill{font-size:.75rem;padding:2px 8px;border-radius:10px;background:#21262d;font-weight:500}
  .cat-IO{color:#79c0ff}.cat-FS{color:#56d364}.cat-NET{color:#f0883e}.cat-MEM{color:#d2a8ff}
  .cat-PROC{color:#ff7b72}.cat-SIG{color:#8b949e}.cat-OTHER{color:#6e7681}
  .wrap{padding:8px 24px 60px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.82rem;table-layout:fixed}
  thead th{text-align:left;padding:6px 10px;color:#8b949e;font-weight:600;border-bottom:1px solid #30363d;white-space:nowrap;cursor:pointer;user-select:none;overflow:hidden;text-overflow:ellipsis}
  thead th.rnum{text-align:right}
  thead th.spark-col{width:100px;cursor:default}
  thead th:hover{color:#e6edf3}
  thead th.asc::after{content:" ▲"}
  thead th.desc::after{content:" ▼"}
  tbody tr{border-bottom:1px solid #161b22;transition:background .1s;cursor:pointer}
  tbody tr:hover{background:#161b22}
  td{padding:5px 10px;white-space:nowrap}
  td.name{font-family:monospace;color:#79c0ff}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  td.err{text-align:right;color:#f85149}
  td.slow{color:#e3b341}
  .spark{display:inline-block;width:80px;height:8px;background:#21262d;border-radius:2px;vertical-align:middle}
  .spark-fill{height:100%;background:#1f6feb;border-radius:2px}
  #status{padding:8px 24px;font-size:.75rem;color:#8b949e;border-top:1px solid #30363d;position:fixed;bottom:0;width:100%;background:#0d1117}
  #status.err{color:#f85149}
  .tag{font-size:.7rem;padding:1px 6px;border-radius:8px;margin-left:4px}
  #alerts-section{display:none;padding:8px 24px;border-bottom:1px solid #30363d}
  #alerts-hdr{font-size:.75rem;font-weight:700;color:#f85149;margin-bottom:4px;letter-spacing:.05em}
  .alert-row{font-size:.82rem;padding:3px 0;font-family:monospace}
  .alert-row.hot{color:#f85149}
  .alert-row.slow{color:#e3b341}
  /* tab bar — pill style matching category bar */
  .tabs{background:#161b22;border-bottom:1px solid #30363d;padding:8px 24px;display:flex;gap:10px;flex-wrap:wrap}
  .tab-btn{font-size:.75rem;padding:3px 10px;border-radius:10px;background:#21262d;font-weight:600;cursor:pointer;border:none;color:#8b949e;transition:background .15s,color .15s;letter-spacing:.02em}
  .tab-btn.active{background:#1f6feb;color:#fff}
  .tab-btn:hover:not(.active){background:#30363d;color:#e6edf3}
  /* log panel */
  #log-panel{display:none;padding:0 24px 60px;overflow-x:auto}
  #log-wrap{max-height:calc(100vh - 180px);overflow-y:auto;margin-top:12px}
  #log-table{width:100%;border-collapse:collapse;font-size:.78rem;font-family:monospace}
  #log-table td{padding:2px 8px;white-space:nowrap;color:#8b949e}
  #log-table tr.error td{color:#f85149}
  #log-table td.l-name{color:#79c0ff;width:120px}
  #log-table td.l-ts{width:100px;color:#6e7681}
  #log-table td.l-args{color:#8b949e;max-width:600px;overflow:hidden;text-overflow:ellipsis}
  /* process exited banner */
  #done-banner{display:none;padding:8px 24px;background:#3d2f00;border-bottom:2px solid #e3b341;
               font-size:.82rem;color:#e3b341;font-weight:600;letter-spacing:.03em}
  /* search bar */
  #search-bar{padding:14px 24px 8px 34px;background:#0d1117;display:flex;align-items:center;gap:8px}
  #search-input{background:#21262d;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-family:monospace;font-size:.82rem;padding:5px 10px;width:220px;outline:none}
  #search-input:focus{border-color:#58a6ff}
  #search-label{font-size:.78rem;color:#8b949e}
  #search-clear{cursor:pointer;color:#8b949e;font-size:.9rem;display:none;background:none;border:none;padding:0 4px;line-height:1}
  #search-clear:hover{color:#e6edf3}
  #search-count{font-size:.75rem;color:#8b949e;margin-left:4px}
</style>
</head>
<body>
<header>
  <h1>stracectl</h1>
  <span id="proc-info"></span>
  <div id="meta">
    <span>syscalls: <b id="m-total">—</b></span>
    <span>rate: <b id="m-rate">—</b>/s</span>
    <span>errors: <b id="m-errors">—</b></span>
    <span>unique: <b id="m-unique">—</b></span>
  </div>
</header>
<div id="done-banner">&#x23F9; Process exited — trace complete. Data frozen.</div>
<div class="bar-wrap" id="cat-bar"></div>
<div id="alerts-section">
  <div id="alerts-hdr">⚠ ANOMALY ALERTS</div>
  <div id="alerts-list"></div>
</div>
<div class="tabs">
  <button class="tab-btn active" id="tab-stats" onclick="switchTab('stats')">SYSCALL STATS</button>
  <button class="tab-btn" id="tab-log" onclick="switchTab('log')">LIVE LOG</button>
</div>
<div id="search-bar">
  <span id="search-label">FILTER:</span>
  <input id="search-input" type="text" placeholder="syscall name…" autocomplete="off" spellcheck="false">
  <button id="search-clear" title="Clear filter">&#x2715;</button>
  <span id="search-count"></span>
</div>
<div class="wrap" id="stats-panel">
<table>
  <thead>
    <tr>
      <th data-col="Name" style="width:22%">SYSCALL</th>
      <th data-col="Category" style="width:80px">CAT</th>
      <th data-col="Count" class="desc rnum" style="width:7%">CALLS</th>
      <th data-col="_bar" class="spark-col"></th>
      <th data-col="AvgTime" class="rnum" style="width:8%">AVG</th>
      <th data-col="MaxTime" class="rnum" style="width:8%">MAX</th>
      <th data-col="TotalTime" class="rnum" style="width:9%">TOTAL</th>
      <th data-col="Errors" class="rnum" style="width:8%">ERRORS</th>
      <th data-col="_erp" class="rnum" style="width:6%">ERR%</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>
<div id="log-panel">
  <div id="log-wrap">
    <table id="log-table"><tbody id="log-tbody"></tbody></table>
  </div>
</div>
<div id="status">Connecting…</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
