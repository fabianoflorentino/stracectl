<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
  {{ partial "head.html" . }}
  <body class="{{ if .IsHome }}page-home{{ else }}page-inner{{ end }}">
    {{ partial "header.html" . }}
    <main id="main-content">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    <button id="back-to-top" aria-label="Back to top" title="Back to top">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <script src="{{ "js/main.js" | absURL }}"></script>
  </body>
</html>
