baseURL = "https://fabianoflorentino.github.io/stracectl/"
languageCode = "en-us"
title = "stracectl"
theme = "stracectl"

[params]
  description = "A modern strace with real-time htop-style TUI and Kubernetes sidecar mode"
  github = "https://github.com/fabianoflorentino/stracectl"
  docker  = "https://hub.docker.com/r/fabianoflorentino/stracectl"
  version = "v1.0.124"
  tagline = "Modern strace. Real-time TUI. Kubernetes-ready."
  subtitle = "Aggregate syscalls live — counts, latencies, errors, anomalies — in an interactive dashboard or HTTP sidecar."
  author  = "Fabiano Florentino"
  license = "Apache License 2.0"
  license_url = "https://www.apache.org/licenses/LICENSE-2.0"

[menu]
  [[menu.main]]
    name   = "Features"
    url    = "/#features"
    weight = 1
  [[menu.main]]
    name   = "Docs"
    url    = "/docs/"
    weight = 2
  [[menu.main]]
    name   = "Contributing"
    url    = "/docs/contributing/"
    weight = 3


[markup]
  [markup.highlight]
    style     = "github-dark"
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
