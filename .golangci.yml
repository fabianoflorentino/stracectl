linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - noctx
    - gosec

linters-settings:
  goimports:
    local-prefixes: github.com/fabianoflorentino/stracectl
  gosec:
    excludes:
      - G204  # subprocess via variable — intentional (wraps strace)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
