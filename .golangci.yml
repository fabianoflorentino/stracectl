version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - noctx
    - gosec
  settings:
    gosec:
      excludes:
        - G204  # subprocess via variable — intentional (wraps strace)
        - G101  # false positive: syscall description map flagged as credentials
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
