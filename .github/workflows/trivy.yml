name: Vulnerability scan

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip scanning)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
      - development
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '**/*.md'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'
      - '.*/**'

jobs:
  scan:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: 'CRITICAL,HIGH'
