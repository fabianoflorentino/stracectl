name: Deploy

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip publishing actions)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/**'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/**'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'

permissions:
  contents: read

jobs:
  generate_bpf:
    name: Generate BPF artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev build-essential libbpf-dev linux-headers-$(uname -r)

      - name: Ensure bpf2go available
        run: |
          set -euo pipefail
          echo "Installing bpf2go"
          go install github.com/cilium/ebpf/cmd/bpf2go@latest
          echo "bpf2go installed to: $(go env GOPATH)/bin"

      - name: Build BPF objects with installed bpf2go
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          echo "Using bpf2go: $(which bpf2go || true)"
          echo "PWD: $(pwd)"
          cd internal/tracer
          echo "Invoking: bpf2go -cc clang ebpf bpf/syscall.c"
          bpf2go -cc clang ebpf bpf/syscall.c
          echo "-- generated files in internal/tracer --"
          ls -la . || true
          if [ ! -f ebpf_bpfel.o ] || [ ! -f ebpf_bpfeb.o ]; then
            echo "ERROR: expected BPF .o files missing after bpf2go"
            ls -la . || true
            exit 1
          fi

      - name: Upload BPF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bpf-artifacts
          path: internal/tracer/*.o

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [generate_bpf]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download BPF artifacts
        uses: actions/download-artifact@v3
        with:
          name: bpf-artifacts
          path: internal/tracer

      - name: List generated artifacts
        run: |
          ls -la internal/tracer || true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.11.1
          args: --timeout=5m

  # ── Test + Coverage ─────────────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: [generate_bpf]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download BPF artifacts
        uses: actions/download-artifact@v3
        with:
          name: bpf-artifacts
          path: internal/tracer

      - name: Run tests with race detector
        run: |
          go test -race -timeout 120s \
            -coverprofile=coverage.out -covermode=atomic \
            -coverpkg=./internal/... \
            ./...

      - name: Check coverage ≥ 80%
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep '^total:' \
            | awk '{print $3}' \
            | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < 80)}"; then
            echo "❌ Coverage ${COVERAGE}% is below the required 80%"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets the 80% threshold"

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-report
          path: coverage.out

  # ── Dependency review (PRs only) ────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: moderate

  # ── Vulnerability scan ──────────────────────────────────────────────────────
  vuln:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ── SAST ─────────────────────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # v1
        with:
          config: p/go

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [lint, test, vuln, sast]
    uses: ./.github/workflows/build.yml
    with:
      build_ebpf: false
      run_tests: false
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
