name: Deploy

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip publishing actions)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'
      - '.agents/**'
      - '.*/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'
      - '.agents/**'
      - '.*/**'

permissions:
  contents: read

jobs:
  generate_bpf:
    name: Generate BPF artifacts (reusable)
    uses: ./.github/workflows/ebpf-build.yml
    with:
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
    secrets: inherit

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [generate_bpf]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download BPF artifacts
        uses: actions/download-artifact@v4
        with:
          name: bpf-artifacts
          path: internal/tracer

      - name: List generated artifacts
        run: |
          ls -la internal/tracer || true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.11.1
          args: --timeout=5m

  # ── Test + Coverage ─────────────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: [generate_bpf]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download BPF artifacts
        uses: actions/download-artifact@v4
        with:
          name: bpf-artifacts
          path: internal/tracer

      - name: Run tests with race detector
        run: |
          go test -race -timeout 120s \
            -coverprofile=coverage.out -covermode=atomic \
            -coverpkg=./internal/... \
            ./...

      - name: Check coverage ≥ 80%
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep '^total:' \
            | awk '{print $3}' \
            | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < 80)}"; then
            echo "❌ Coverage ${COVERAGE}% is below the required 80%"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets the 80% threshold"

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-report
          path: coverage.out

  # ── Dependency review (PRs only) ────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: moderate

  # ── Vulnerability scan ──────────────────────────────────────────────────────
  vuln:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ── SAST ─────────────────────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # v1
        with:
          config: p/go

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [generate_bpf, lint, test, vuln, sast]
    uses: ./.github/workflows/build.yml
    with:
      build_ebpf: false
      run_tests: false
      download_bpf_artifacts: true
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
