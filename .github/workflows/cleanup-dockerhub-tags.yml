name: Cleanup Docker Hub Tags

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (list without removing)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      image:
        description: "Docker Hub image (NAMESPACE/REPOSITORY). Leave blank to use the repo name."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  cleanup:
    name: Remove old Docker Hub tags
    environment: DOCKERHUB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: |
          IMAGE="${{ inputs.image }}"
          if [[ -z "$IMAGE" ]]; then
            IMAGE="${{ github.repository }}"
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Image: $IMAGE"

      - name: Authenticate with Docker Hub
        id: auth
        run: |
          TOKEN=$(curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${{ secrets.DOCKERHUB_USERNAME }}\", \"password\": \"${{ secrets.DOCKERHUB_TOKEN }}\"}" \
            "https://hub.docker.com/v2/users/login" | jq -r '.token')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: List current tags
        run: |
          IMAGE="${{ steps.image.outputs.image }}"
          NAMESPACE="${IMAGE%%/*}"
          REPOSITORY="${IMAGE##*/}"

          echo "=== Current tags for $IMAGE ==="
          curl -fsSL \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            "https://hub.docker.com/v2/repositories/${NAMESPACE}/${REPOSITORY}/tags/?page_size=100" \
            | jq -r '.results | sort_by(.last_updated) | .[] | "\(.name)  last_updated=\(.last_updated)"'

      - name: Run cleanup (dry-run)
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          IMAGE="${{ steps.image.outputs.image }}"
          NAMESPACE="${IMAGE%%/*}"
          REPOSITORY="${IMAGE##*/}"

          all_tags=$(curl -fsSL \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            "https://hub.docker.com/v2/repositories/${NAMESPACE}/${REPOSITORY}/tags/?page_size=100" \
            | jq -r '[.results | sort_by(.last_updated) | .[].name] | .[]')

          latest=$(echo "$all_tags" | grep -v '^latest$' | tail -1)

          echo "=== [DRY-RUN] Tag kept: $latest ==="
          echo "=== [DRY-RUN] Would be removed: ==="
          echo "$all_tags" | grep -v "^${latest}$" || true

      - name: Run cleanup
        if: ${{ inputs.dry_run == 'false' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          chmod +x scripts/cleanup-dockerhub-tags.sh
          scripts/cleanup-dockerhub-tags.sh "${{ steps.image.outputs.image }}"
