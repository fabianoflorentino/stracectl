name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'site/**'
      - 'scripts/**'
      - '.*/**'
      - 'Makefile'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'site/**'
      - 'scripts/**'
      - '.*/**'
      - 'Makefile'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip publishing actions)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      site: ${{ steps.filter.outputs.site }}
      docs: ${{ steps.filter.outputs.docs }}
      ebpf: ${{ steps.filter.outputs.ebpf }}
      code: ${{ steps.filter.outputs.code }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            site:
              - 'site/**'
            docs:
              - 'docs/**'
            ebpf:
              - 'internal/tracer/**'
              - 'scripts/generate-bpf.sh'
            code:
              - 'cmd/**'
              - 'internal/**'
              - 'ui/**'
            docker:
              - 'Dockerfile'
              - 'docker/**'

  core:
    name: Core pipeline (deploy)
    needs: changes
    uses: ./.github/workflows/deploy.yml
    with:
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}

  docker_flow:
    name: Docker pipeline (reusable)
    needs: core
    uses: ./.github/workflows/docker.yml
    with:
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
      skip_build: true

  pages_build_and_deploy:
    name: Site Build & Deploy
    needs: changes
    if: needs.changes.outputs.site == 'true'
    uses: ./.github/workflows/pages.yml
    with:
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}

  # Optional: keep cleanup as a separate, manual workflow
