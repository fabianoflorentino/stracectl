# Builds and releases the stracectl binary for Linux (amd64 and arm64).
#
# stracectl is Linux-only at runtime — it relies on the strace binary and
# ptrace, both of which are Linux-specific.
#
# Required secrets:
#   GITHUB_TOKEN  — provided automatically by GitHub Actions

name: Linux

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '.github/**'
      - '**/*.md'

permissions:
  contents: write

jobs:
  # ── Build binaries ───────────────────────────────────────────────────────────
  build:
    name: Build for Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build for Linux/${{ matrix.arch }}
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -trimpath -ldflags="-s -w" \
            -o stracectl-linux-${{ matrix.arch }} .

      - name: Upload Linux/${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v7
        with:
          name: stracectl-linux-${{ matrix.arch }}
          path: stracectl-linux-${{ matrix.arch }}

  # ── Create GitHub Release with binaries ─────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: stracectl-linux-amd64
          path: ./artifacts

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: stracectl-linux-arm64
          path: ./artifacts

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.${{ github.run_number }}-linux
          release_name: v1.0.${{ github.run_number }}-linux
          draft: false
          prerelease: false

      - name: Upload Linux amd64 asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/stracectl-linux-amd64
          asset_name: stracectl-linux-amd64
          asset_content_type: application/octet-stream

      - name: Upload Linux arm64 asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/stracectl-linux-arm64
          asset_name: stracectl-linux-arm64
          asset_content_type: application/octet-stream
