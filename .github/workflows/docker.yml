# Required secrets (Settings → Secrets and variables → Actions):
#
#   Environment: DOCKERHUB
#     DOCKERHUB_USERNAME  Docker Hub login name
#     DOCKERHUB_TOKEN     Docker Hub access token
#
#   Environment: GITHUB
#     GIT_HUB_TOKEN  GitHub personal access token with contents:write scope

name: Docker Build, Publish, Tag and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '.github/**'
      - '**/*.md'
      - 'scripts/**'

permissions:
  contents: write
  packages: write

jobs:
  # ── Build & push Docker image to Docker Hub ────────────────────────────────
  build_and_push:
    name: Build and Push to Docker Hub
    environment: DOCKERHUB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --no-cache --rm \
            -t ${{ github.repository }}:v1.0.${{ github.run_number }} \
            -f ./Dockerfile .

      - name: Push Docker image to Docker Hub
        run: docker push ${{ github.repository }}:v1.0.${{ github.run_number }}

  # ── Create and push Git tag ──────────────────────────────────────────────────
  tag:
    name: Tag
    environment: GITHUB
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        id: create_tag
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

          git remote set-url origin https://x-access-token:${GIT_HUB_TOKEN}@github.com/${{ github.repository }}

          git tag $TAG_NAME
          git push origin $TAG_NAME

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        env:
          GIT_HUB_TOKEN: ${{ secrets.GIT_HUB_TOKEN }}

    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Release
    environment: GITHUB
    needs: [build_and_push, tag]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag_name }}
          name: ${{ needs.tag.outputs.tag_name }}
          generate_release_notes: true
        env:
          GIT_HUB_TOKEN: ${{ secrets.GIT_HUB_TOKEN }}

  # ── Trigger pkg.go.dev to index the new version ──────────────────────────────
  go_proxy:
    name: pkg.go.dev
    needs: [build_and_push, tag, release]
    runs-on: ubuntu-latest

    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.26"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update pkg.go.dev
        run: GOPROXY=https://proxy.golang.org go list -m github.com/fabianoflorentino/stracectl@v1.0.${{ github.run_number }}
