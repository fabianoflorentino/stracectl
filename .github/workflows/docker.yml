# Required secrets (Settings → Secrets and variables → Actions):
#
#   Environment: DOCKERHUB
#     DOCKERHUB_USERNAME  Docker Hub login name
#     DOCKERHUB_TOKEN     Docker Hub access token
#
#   Environment: GITHUB
#     GIT_HUB_TOKEN  GitHub personal access token with contents:write scope

name: Docker Build, Publish, Tag and Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip publishing actions)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '.github/**'
      - '**/*.md'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'

permissions:
  contents: write
  packages: write

jobs:
  # Reusable build job (produces artifacts used by later jobs)
  build:
    name: Build (reusable)
    uses: ./.github/workflows/build.yml
    with:
      build_ebpf: true
      run_tests: true
      dry_run: ${{ github.event.inputs.dry_run }}

  # ── Build & push Docker image to Docker Hub ────────────────────────────────
  build_and_push:
    name: Build and Push to Docker Hub
    environment: DOCKERHUB
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ensure GITHUB_TOKEN env
        run: |
          # Prefer an explicitly-provided secret 'GIT_HUB_TOKEN' if present
          if [ -n "${{ secrets.GIT_HUB_TOKEN }}" ]; then
            echo "Using secrets.GIT_HUB_TOKEN as GITHUB_TOKEN"
            echo "GITHUB_TOKEN=${{ secrets.GIT_HUB_TOKEN }}" >> $GITHUB_ENV
          else
            echo "Using runner-provided GITHUB_TOKEN (secrets.GITHUB_TOKEN)"
            echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to Docker Hub
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          # Build standard production image
          docker build --no-cache --rm --target production \
            -t ${{ github.repository }}:v1.0.${{ github.run_number }} \
            -f ./Dockerfile .

          # Build eBPF-enabled production image (separate tag)
          docker build --no-cache --rm --target production-ebpf \
            -t ${{ github.repository }}:v1.0.${{ github.run_number }}-ebpf \
            -f ./Dockerfile .

      - name: Push Docker images to Docker Hub
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          docker push ${{ github.repository }}:v1.0.${{ github.run_number }}
          docker push ${{ github.repository }}:v1.0.${{ github.run_number }}-ebpf

      - name: Download standard binary artifact
        uses: actions/download-artifact@v4
        with:
          name: stracectl-linux-amd64
          path: .

      - name: Download eBPF artifact (if present)
        uses: actions/download-artifact@v4
        with:
          name: stracectl-linux-amd64-ebpf
          path: .
        continue-on-error: true

  # ── Docker Scout CVE scan ────────────────────────────────────────────────────
  docker_scout:
    name: Docker Scout CVE Scan
    environment: DOCKERHUB
    needs: build_and_push
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ github.repository }}:v1.0.${{ github.run_number }}
          only-severities: critical,high
          exit-code: true

      - name: Docker Scout CVE scan (eBPF image)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ github.repository }}:v1.0.${{ github.run_number }}-ebpf
          only-severities: critical,high
          exit-code: true

  # ── Create and push Git tag ──────────────────────────────────────────────────
  tag:
    name: Tag
    environment: GITHUB
    needs: [build_and_push, docker_scout]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        id: create_tag
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

          git tag $TAG_NAME
          git push origin $TAG_NAME

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Release
    environment: GITHUB
    needs: [build_and_push, docker_scout, tag]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag_name }}
          name: ${{ needs.tag.outputs.tag_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download eBPF build artifact
        uses: actions/download-artifact@v4
        with:
          name: stracectl-linux-amd64-ebpf
          path: .

      - name: Ensure eBPF binary present
        run: |
          if [ ! -f ./stracectl-ebpf ]; then
            echo "eBPF binary artifact not found; aborting release step" >&2
            ls -la
            exit 1
          fi

      - name: Upload eBPF asset to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./stracectl-ebpf
          asset_name: stracectl-linux-amd64-ebpf
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Trigger pkg.go.dev to index the new version ──────────────────────────────
  go_proxy:
    name: pkg.go.dev
    needs: [build_and_push, docker_scout, tag, release]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.26"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update pkg.go.dev
        run: GOPROXY=https://proxy.golang.org go list -m github.com/fabianoflorentino/stracectl@v1.0.${{ github.run_number }}
