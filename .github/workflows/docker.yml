# Required secrets (Settings → Secrets and variables → Actions):
#
#   Environment: DOCKERHUB
#     DOCKERHUB_USERNAME  Docker Hub login name
#     DOCKERHUB_TOKEN     Docker Hub access token
#
#   Environment: GITHUB
#     GIT_HUB_TOKEN  GitHub personal access token with contents:write + workflow scope

name: Image, Publish, Tag and Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip publishing actions)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '**/*.md'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'
      - '.*/**'

permissions:
  contents: write
  packages: write

jobs:
  # Reusable build job (produces artifacts used by later jobs)
  build:
    name: Build (reusable)
    uses: ./.github/workflows/build.yml
    with:
      build_ebpf: true
      run_tests: true
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}

  # ── Build & push Docker image to Docker Hub ────────────────────────────────
  build_and_push:
    name: Build and Push to Docker Hub
    environment: DOCKERHUB
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ensure GITHUB_TOKEN env
        run: |
          # Tag pushes that reference commits touching .github/workflows/*
          # require a PAT with workflow scope. Fail fast if missing.
          if [ -z "${{ secrets.GIT_HUB_TOKEN }}" ]; then
            echo "GIT_HUB_TOKEN is required (contents:write + workflow scope)."
            exit 1
          fi
          echo "Using secrets.GIT_HUB_TOKEN as GITHUB_TOKEN"
          echo "GITHUB_TOKEN=${{ secrets.GIT_HUB_TOKEN }}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to Docker Hub
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          # Build single production image that contains both backends
          IMAGE_REF="${{ github.repository }}:v1.0.${{ github.run_number }}"
          echo "IMAGE_REF=${IMAGE_REF}" >> $GITHUB_ENV
          docker build --no-cache --rm --target production \
            -t "${IMAGE_REF}" \
            -f ./Dockerfile .

      - name: Smoke test — verify binary entrypoint
        run: |
          echo "Running smoke test on ${IMAGE_REF}"
          OUTPUT=$(docker run --rm "${IMAGE_REF}" --help 2>&1 || true)
          echo "${OUTPUT}"
          if ! echo "${OUTPUT}" | grep -qE "attach|Usage:|stracectl"; then
            echo "Smoke test FAILED: binary did not produce expected help output"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Push Docker image to Docker Hub
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          docker push "${IMAGE_REF}"

      - name: Download standard binary artifact
        uses: actions/download-artifact@v4
        with:
          name: stracectl-linux-amd64
          path: .

      # eBPF artifact is no longer produced under a separate name; the
      # unified `stracectl-linux-amd64` artifact is downloaded above.

  # ── Docker Scout CVE scan ────────────────────────────────────────────────────
  docker_scout:
    name: Docker Scout CVE Scan
    environment: DOCKERHUB
    needs: build_and_push
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ github.repository }}:v1.0.${{ github.run_number }}
          only-severities: critical,high
          exit-code: true

      # eBPF image is now included in the single production image; no separate
      # CVE scan needed for a separate -ebpf tag.

  # ── Create and push Git tag ──────────────────────────────────────────────────
  tag:
    name: Tag
    environment: GITHUB
    needs: [build_and_push, docker_scout]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure GITHUB_TOKEN env
        run: |
          # Prefer an explicitly-provided secret 'GIT_HUB_TOKEN' if present
          if [ -n "${{ secrets.GIT_HUB_TOKEN }}" ]; then
            echo "Using secrets.GIT_HUB_TOKEN as GITHUB_TOKEN"
            echo "GITHUB_TOKEN=${{ secrets.GIT_HUB_TOKEN }}" >> $GITHUB_ENV
          else
            echo "Using runner-provided GITHUB_TOKEN (secrets.GITHUB_TOKEN)"
            echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          fi

      - name: Create and push tag
        id: create_tag
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

          git tag $TAG_NAME
          git push origin $TAG_NAME

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Release
    environment: GITHUB
    needs: [build_and_push, docker_scout, tag]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag_name }}
          name: ${{ needs.tag.outputs.tag_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download standard build artifact
        uses: actions/download-artifact@v4
        with:
          name: stracectl-linux-amd64
          path: .
        continue-on-error: true

      - name: Upload binary asset to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./stracectl
          asset_name: stracectl-linux-amd64
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Trigger pkg.go.dev to index the new version ──────────────────────────────
  go_proxy:
    name: pkg.go.dev
    needs: [build_and_push, docker_scout, tag, release]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.26"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update pkg.go.dev
        run: GOPROXY=https://proxy.golang.org go list -m github.com/fabianoflorentino/stracectl@v1.0.${{ github.run_number }}
