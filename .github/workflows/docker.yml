# Builds and pushes the production Docker image to:
#   - GitHub Container Registry (ghcr.io)  — always, using GITHUB_TOKEN
#   - Docker Hub (docker.io)               — when DOCKERHUB_USERNAME and
#                                            DOCKERHUB_TOKEN secrets are set
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME   your Docker Hub login name
#   DOCKERHUB_TOKEN      a Docker Hub access token (not your password)
#
# Tagging strategy:
#   push to main      →  main, sha-<short-sha>
#   push of v1.2.3    →  1.2.3, 1.2, 1, latest

name: Docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Image metadata (tags + labels) ──────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/stracectl
            ${{ secrets.DOCKERHUB_USERNAME }}/stracectl
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      # ── Multi-arch support ──────────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Registry logins ─────────────────────────────────────────────────────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GIT_HUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build & push ─────────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache keeps layer caches across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
