name: Site Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (build site without deploying)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  pages:    write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history for .GitInfo / .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        working-directory: site
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --baseURL "https://fabianoflorentino.github.io/stracectl/" \
            --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    environment:
      name: github
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
