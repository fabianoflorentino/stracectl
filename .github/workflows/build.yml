name: Build

on:
  workflow_call:
    inputs:
      build_ebpf:
        description: 'Build eBPF-enabled binary on a self-hosted runner'
        required: false
        type: boolean
        default: false
      run_tests:
        description: 'Run tests during the build job'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  standard_build:
    name: Build binary and (optionally) run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        if: ${{ inputs.run_tests == 'true' }}
        run: |
          go test -race -timeout 120s ./internal/... -v

      - name: Build binary
        run: |
          go build -v -o stracectl .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: stracectl-linux-amd64
          path: stracectl

  ebpf_build:
    name: Build eBPF-enabled binary
    if: ${{ inputs.build_ebpf == 'true' }}
    runs-on: [self-hosted, linux, ebpf]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Ensure bpf2go available (best-effort)
        run: |
          go install github.com/cilium/ebpf/cmd/bpf2go@latest || true

      - name: Generate BPF artifacts
        run: go generate ./internal/tracer/...

      - name: Build eBPF-enabled binary
        env:
          CGO_ENABLED: 1
        run: |
          CGO_ENABLED=1 go build -tags=ebpf -v -o stracectl-ebpf .

      - name: Upload eBPF artifact
        uses: actions/upload-artifact@v4
        with:
          name: stracectl-linux-amd64-ebpf
          path: stracectl-ebpf
