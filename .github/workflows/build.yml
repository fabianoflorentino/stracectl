name: Build

on:
  workflow_call:
    inputs:
      build_ebpf:
        description: 'Build eBPF-enabled binary on a self-hosted runner'
        required: false
        type: boolean
        default: false
      run_tests:
        description: 'Run tests during the build job'
        required: false
        type: boolean
        default: true
      dry_run:
        description: 'Dry-run (skip publishing actions)'
        required: false
        type: boolean
        default: false
      download_bpf_artifacts:
        description: 'Download previously generated BPF .o artifacts instead of running go generate'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  standard_build:
    name: Build binary and (optionally) run tests
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ inputs.dry_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies for eBPF generation
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev build-essential libbpf-dev linux-headers-$(uname -r)

      - name: Ensure bpf2go available (best-effort)
        run: |
          go install github.com/cilium/ebpf/cmd/bpf2go@latest

      - name: Download BPF artifacts (if provided)
        if: ${{ inputs.download_bpf_artifacts }}
        uses: actions/download-artifact@v4
        with:
          name: bpf-artifacts
          path: internal/tracer

      - name: Generate BPF artifacts (best-effort)
        if: ${{ inputs.download_bpf_artifacts == false }}
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          mkdir -p internal/tracer/bpf

          # If kernel BTF is exposed in the runner, dump it and run bpf2go.
          if [ -f /sys/kernel/btf/vmlinux ]; then
            echo "Found /sys/kernel/btf/vmlinux - dumping to internal/tracer/bpf/vmlinux.h"
            sudo apt-get update || true
            sudo apt-get install -y bpftool dwarves || true
            sudo bpftool btf dump file /sys/kernel/btf/vmlinux format c > internal/tracer/bpf/vmlinux.h || true
            bash scripts/generate-bpf.sh || true
          elif [ -f /boot/vmlinux-$(uname -r) ]; then
            echo "Found /boot/vmlinux-$(uname -r) - dumping to internal/tracer/bpf/vmlinux.h"
            sudo apt-get update || true
            sudo apt-get install -y bpftool dwarves || true
            sudo bpftool btf dump file /boot/vmlinux-$(uname -r) format c > internal/tracer/bpf/vmlinux.h || true
            bash scripts/generate-bpf.sh || true
          else
            echo "No kernel BTF found on ubuntu runner; creating placeholder .o files so tests can run"
            mkdir -p internal/tracer
            touch internal/tracer/ebpf_bpfel.o internal/tracer/ebpf_bpfeb.o || true
            ls -la internal/tracer || true
          fi

      - name: Download eBPF object artifacts (if any)
        uses: actions/download-artifact@v4
        with:
          name: ebpf-objects
          path: internal/tracer
        continue-on-error: true

      - name: Ensure embedded eBPF .o files exist (placeholder fallback)
        run: |
          mkdir -p internal/tracer
          # If real objects weren't downloaded/generated, create zero-length placeholders
          [ -f internal/tracer/ebpf_bpfel.o ] || touch internal/tracer/ebpf_bpfel.o
          [ -f internal/tracer/ebpf_bpfeb.o ] || touch internal/tracer/ebpf_bpfeb.o
          ls -la internal/tracer || true

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: |
          go test -race -timeout 120s ./internal/... -v

      - name: Build binary
        run: |
          go build -v -o stracectl .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: stracectl-linux-amd64
          path: stracectl

  ebpf_build:
    needs: standard_build
    uses: ./.github/workflows/ebpf-build.yml
    if: ${{ inputs.build_ebpf }}
    with:
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
