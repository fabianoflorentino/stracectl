name: eBPF Build & Generate

on:
  push:
  pull_request:

jobs:
  bpf:
    name: Generate and Test eBPF artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev build-essential

      - name: Generate BPF artifacts
        run: make generate-bpf

      - name: Run tracer tests
        run: go test ./internal/tracer -v
