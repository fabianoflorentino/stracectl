name: eBPF Build & Generate
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip integration tests)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'
      - '.*/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'
      - '.*/**'

jobs:
  bpf:
    name: Generate and Test eBPF artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev build-essential libbpf-dev linux-headers-$(uname -r)

      - name: Ensure bpf2go available (best-effort)
        run: |
          go install github.com/cilium/ebpf/cmd/bpf2go@latest || true

      - name: Generate kernel vmlinux.h (if possible)
        run: |
          set -euo pipefail
          sudo apt-get update || true
          sudo apt-get install -y bpftool dwarves || true
          mkdir -p internal/tracer/bpf
          if [ -f /sys/kernel/btf/vmlinux ]; then
            echo "Found /sys/kernel/btf/vmlinux - dumping to internal/tracer/bpf/vmlinux.h"
            sudo bpftool btf dump file /sys/kernel/btf/vmlinux format c > internal/tracer/bpf/vmlinux.h || true
          elif [ -f /boot/vmlinux-$(uname -r) ]; then
            echo "Found /boot/vmlinux-$(uname -r) - dumping to internal/tracer/bpf/vmlinux.h"
            sudo bpftool btf dump file /boot/vmlinux-$(uname -r) format c > internal/tracer/bpf/vmlinux.h || true
          else
            echo "No kernel BTF found on runner; generate-bpf may fail unless vmlinux.h is provided"
          fi

      - name: Generate BPF artifacts
        run: |
          set -euo pipefail
          set -x
          bash scripts/generate-bpf.sh
      - name: Run tracer unit tests (no tags)
        run: go test ./internal/tracer -v

      - name: Build eBPF-enabled binary
        run: |
          CGO_ENABLED=1 go build -tags=ebpf -v -o stracectl .

      - name: Upload eBPF binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: stracectl-linux-amd64-ebpf
          path: stracectl

      - name: Upload eBPF object artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-objects
          path: internal/tracer/ebpf_*.o

  integration:
    name: eBPF Integration (self-hosted)
    # This job requires a self-hosted runner with the label `ebpf`.
    # See README.md and site docs (site/content/docs/self-hosted-runner.md)
    # for provisioning instructions and required packages/privileges.
    runs-on: [self-hosted, linux, ebpf]
    needs: bpf

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Download eBPF object artifacts
        uses: actions/download-artifact@v4
        with:
          name: ebpf-objects
          path: internal/tracer

      - name: Install system dependencies (if available)
        run: |
          sudo apt-get update || true
          sudo apt-get install -y clang llvm libelf-dev build-essential libbpf-dev linux-headers-$(uname -r) || true

      - name: Generate BPF artifacts
        run: make generate-bpf || true

      - name: Run eBPF integration tests
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          # Integration tests require a kernel that supports eBPF and permissions
          CGO_ENABLED=1 go test -tags=ebpf ./internal/tracer -v
