apiVersion: v1
kind: Pod
metadata:
  name: stracectl-e2e
  namespace: default
  labels:
    app: stracectl-e2e
spec:
  shareProcessNamespace: true
  containers:
    - name: app
      image: registry.k8s.io/e2e-test-images/busybox:1.29-4
      command: ["/bin/sh", "-c", "while true; do sleep 5; done"]

    - name: stracectl
      image: fabianoflorentino/stracectl:e2e-test
      imagePullPolicy: Never
      args:
        - attach
        - --serve
        - ":8080"
        - --container
        # In this fixture, the app container runs /bin/sh and sleep,
        # so discovery should target a real process name from cmdline/comm.
        - sh
      ports:
        - name: http
          containerPort: 8080
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: false
        runAsUser: 0
        seccompProfile:
          type: Unconfined
        capabilities:
          drop: ["ALL"]
          add: ["SYS_PTRACE"]
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 2
        periodSeconds: 5
